name: Build LaTeX liste.tex

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install minimal TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Compile liste.tex
        run: |
          mkdir -p build
          pdflatex -interaction=nonstopmode -output-directory=build liste.tex
          pdflatex -interaction=nonstopmode -output-directory=build liste.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: liste-pdf
          path: build/liste.pdf
